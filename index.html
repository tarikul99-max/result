<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glorious Education Care - Editable Name Sheet</title>
    <style>
        :root { 
            --primary-green: #1b5e20; 
            --light-green: #4caf50;
            --bg: #f0f4f1; 
            --accent: #0078d4; 
            --danger: #d32f2f;
            --warning: #f57c00;
        }
        
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 1450px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 1px solid #ddd; }
        
        /* Header Logo and Title in ONE Line */
        .excel-header { 
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #43a047 100%); 
            color: white; padding: 15px 30px; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 20px;
        }
        
        .header-logo { height: 75px; width: 75px; background: white; padding: 3px; border-radius: 50%; object-fit: contain; flex-shrink: 0; }
        
        .header-text { text-align: left; }
        .header-text h1 { margin: 0; font-size: 28px; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
        .header-info-wrapper { display: flex; gap: 20px; margin-top: 5px; }
        .header-info-line { font-size: 15px; font-weight: bold; color: #ffeb3b; }
        .header-sub-line { font-size: 15px; opacity: 0.9; font-weight: 500; }

        .subject-manager, .controls, .Name-add, .backup-manager { 
            background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 12px; 
            border: 1px solid #e0e0e0; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
        }
        .backup-manager { border-left: 5px solid var(--warning); background: #fff3e0; }

        select, input { padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
        button { padding: 8px 16px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; transition: 0.2s; }
        .btn-add { background: var(--accent); color: white; }
        .btn-print { background: var(--primary-green); color: white; }
        .btn-reset { background: var(--danger); color: white; }
        .btn-backup { background: var(--warning); color: white; }

        .table-scroll { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 12px; border-radius: 8px; overflow: hidden; }
        th { background-color: #f1f8e9; color: #2e7d32; font-weight: bold; border: 1px solid #c8e6c9; padding: 10px 5px; }
        td { border: 1px solid #e0e0e0; padding: 6px; text-align: center; }
        tr:nth-child(even) { background-color: #fafafa; }
        
        .fm-input { background: #fff9c4; font-weight: bold; border: 1px solid #fbc02d; width: 40px; text-align: center; margin-top: 3px; }
        .input-mark { width: 45px; text-align: center; font-weight: bold; border: 1px solid #ddd; border-radius: 3px; }
        
        /* Editable Name Style */
        .stu-name-cell { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 2px 10px; }
        .stu-name-input { 
            flex-grow: 1; border: none !important; background: transparent; 
            font-weight: bold; font-family: inherit; font-size: 13px; color: #333;
            outline: none; padding: 5px;
        }
        .stu-name-input:focus { background: #e3f2fd; border-radius: 4px; }
        
        .pass { color: #2e7d32; font-weight: bold; background: #e8f5e9; padding: 2px 8px; border-radius: 4px; }
        .fail { color: #c62828; font-weight: bold; background: #ffebee; padding: 2px 8px; border-radius: 4px; }
        .position-badge { background: #388e3c; color: white; padding: 2px 8px; border-radius: 50px; font-weight: bold; }
        
        .btn-remove { color: #d32f2f; cursor: pointer; font-size: 10px; font-weight: bold; border: 1px solid #d32f2f; padding: 1px 5px; border-radius: 3px; background: #fff; }
        .btn-remove:hover { background: #d32f2f; color: #fff; }

        .signature-section { display: none; margin-top: 50px; justify-content: flex-end; padding: 0 50px; }
        .sig-box { border-top: 2px solid #333; width: 200px; text-align: center; font-weight: bold; padding-top: 8px; }

        @media print { 
            body { padding: 0; background: white; }
            .container { box-shadow: none; border: none; padding: 0; width: 100%; max-width: 100%; }
            .excel-header { 
                background: #1b5e20 !important; color: white !important; 
                -webkit-print-color-adjust: exact; padding: 10px;
                display: flex !important; flex-direction: row !important; align-items: center !important; justify-content: center !important;
            }
            .header-text h1 { font-size: 24px !important; }
            .controls, .fm-input, .subject-manager, .btn-remove, .Name-add, .backup-manager { display: none !important; } 
            .signature-section { display: flex !important; }
            tr.empty-row { display: none !important; }
            .stu-name-input { border: none !important; pointer-events: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="excel-header">
        <img src="C:\Users\tarik\OneDrive\Documents\Pictures\WhatsApp Image 2026-03-14 at 7.46.07 PM.jpeg" alt="Logo" class="header-logo" onerror="this.style.display='none'">
        <div class="header-text">
            <h1>GLORIOUS EDUCATION CARE</h1>
            <div class="header-info-wrapper">
                <div class="header-info-line">Exam: <span id="headerExam">Monthly Model Test</span></div>
                <div class="header-sub-line">Class: <span id="headerClass">9</span> | Group: <span id="headerGroup">General</span></div>
            </div>
        </div>
    </div>

    <div class="backup-manager">
        <strong>Data:</strong>
        <button class="btn-backup" onclick="exportData()">💾 Save File</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
        <button class="btn-add" onclick="document.getElementById('importFile').click()">📂 Load File</button>
        <span style="margin-left:auto; color: #666; font-size: 12px;">Added Students: <span id="totalStuCount">0</span>/120</span>
    </div>

    <div class="controls">
        <div><strong>Class:</strong> <select id="classSelect" onchange="saveAndUI()"><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9" selected>9</option><option value="10">10</option></select></div>
        <div><strong>Group:</strong> <select id="groupSelect" onchange="saveAndUI()"><option value="General">General</option><option value="Science">Science</option><option value="Commerce">Commerce</option><option value="Arts">Arts</option></select></div>
        <div><strong>Exam:</strong> <select id="examSelect" onchange="saveAndUI()"><option value="Monthly Model Test">Monthly Test</option><option value="Final Model Test">Final Test</option><option value="Weekly Test">Weekly Test</option></select></div>
        <button class="btn-print" onclick="window.print()">🖨️ Print Sheet</button>
        <button class="btn-reset" onclick="confirmReset()">🗑️ Reset All</button>
    </div>

    <div class="subject-manager">
        <input type="text" id="newSubName" placeholder="Subject Name">
        <button class="btn-add" onclick="addSubject()">+ Add Subject</button>
    </div>

    <div class="Name-add">
        <input type="text" id="newSName" placeholder="Enter Student Name">
        <button class="btn-add" onclick="addSName()">+ Add Student</button>
        <em style="font-size: 11px; color: #666;"></em>
    </div>

    <div class="table-scroll">
        <div id="tableContainer"></div>
    </div>
    
    <div class="signature-section"><div class="sig-box">Director Signature</div></div>
</div>

<script>
    let subjects = []; 
    let studentNames = [];

    function saveAndUI() { saveData(); updateUI(); }

    function saveData() {
        const marks = {};
        document.querySelectorAll('.mark-input').forEach((el, i) => marks[i] = el.value);
        
        // Correctly save edited names from the table
        const editedNames = [];
        document.querySelectorAll('.stu-name-input').forEach(el => editedNames.push(el.value));
        studentNames = editedNames;

        const fmarks = {};
        subjects.forEach((_, i) => fmarks[i] = document.getElementById(`fm_${i}`).value);
        
        const data = { 
            subjects, 
            studentNames, 
            marks, 
            fmarks, 
            class: document.getElementById('classSelect').value, 
            group: document.getElementById('groupSelect').value, 
            exam: document.getElementById('examSelect').value 
        };
        localStorage.setItem('glorious_v2', JSON.stringify(data));
    }

    function loadData() {
        const data = JSON.parse(localStorage.getItem('glorious_v2'));
        if (data) {
            subjects = data.subjects || []; 
            studentNames = data.studentNames || [];
            document.getElementById('classSelect').value = data.class;
            document.getElementById('groupSelect').value = data.group;
            document.getElementById('examSelect').value = data.exam;
            renderTable();
            if(data.marks) {
                const inputs = document.querySelectorAll('.mark-input');
                inputs.forEach((el, i) => { if(data.marks[i] !== undefined) el.value = data.marks[i]; });
                updateCalculations();
            }
        } else { renderTable(); }
    }

    function exportData() { saveData(); const data = localStorage.getItem('glorious_v2'); const blob = new Blob([data], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Results_Sheet.json`; a.click(); }

    function importData(event) { const file = event.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (e) => { localStorage.setItem('glorious_v2', e.target.result); location.reload(); }; reader.readAsText(file); }

    function updateUI() {
        document.getElementById('headerClass').innerText = document.getElementById('classSelect').value;
        document.getElementById('headerGroup').innerText = document.getElementById('groupSelect').value;
        document.getElementById('headerExam').innerText = document.getElementById('examSelect').value;
        document.getElementById('totalStuCount').innerText = studentNames.length;
    }

    function addSubject() { 
        const n = document.getElementById('newSubName').value.trim(); 
        if(n) { subjects.push(n); document.getElementById('newSubName').value = ""; renderTable(); saveAndUI(); } 
    }

    function addSName() { 
        const n = document.getElementById('newSName').value.trim(); 
        if(n) { 
            if(studentNames.length < 120) {
                studentNames.push(n); 
                document.getElementById('newSName').value = ""; 
                renderTable(); 
                saveAndUI(); 
            } else { alert("Max 120 students."); }
        } 
    }

    function removeSubject(i) { if(confirm("Remove Subject?")) { subjects.splice(i, 1); renderTable(); saveAndUI(); } }
    function removeStudent(i) { if(confirm("Remove Student?")) { studentNames.splice(i, 1); renderTable(); saveAndUI(); } }

    function renderTable() {
        const data = JSON.parse(localStorage.getItem('glorious_v2')) || {};
        let html = `<table><thead><tr><th>SL</th><th style="min-width:250px">Student Name (Click to edit)</th>`;
        subjects.forEach((s, i) => {
            let fm = (data.fmarks && data.fmarks[i]) ? data.fmarks[i] : 100;
            html += `<th>${s}<br><input type="number" value="${fm}" class="fm-input" id="fm_${i}" oninput="saveAndCalc()"> <br> <span class="btn-remove" onclick="removeSubject(${i})">X</span></th>`;
        });
        html += `<th>Total</th><th>%</th><th>Status</th><th>Rank</th></tr></thead><tbody id="resultBody">`;
        
        let mCount = 0;
        studentNames.forEach((name, i) => {
            html += `<tr>
                <td>${i+1}</td>
                <td class="stu-name-cell">
                    <input type="text" class="stu-name-input" value="${name}" oninput="saveData()" placeholder="Enter Name">
                    <span class="btn-remove" onclick="removeStudent(${i})">X</span>
                </td>
                ${subjects.map(() => { 
                    let v = (data.marks && data.marks[mCount]) ? data.marks[mCount] : 0; 
                    mCount++; 
                    return `<td><input type="number" class="mark-input input-mark" oninput="saveAndCalc()" value="${v}"></td>`; 
                }).join('')}
                <td class="total-val">0</td><td class="pct-val">0%</td><td class="status-val">-</td><td class="pos-val">-</td>
            </tr>`;
        });
        
        let fillerRows = Math.max(5, 8 - studentNames.length);
        for(let i = 0; i < fillerRows; i++) {
            let sl = studentNames.length + i + 1;
            html += `<tr class="empty-row"><td>${sl}</td><td></td>${subjects.map(() => `<td></td>`).join('')}<td></td><td></td><td></td><td></td></tr>`;
        }
        
        document.getElementById('tableContainer').innerHTML = html + `</tbody></table>`;
        updateCalculations();
    }

    function saveAndCalc() { saveData(); updateCalculations(); }

    function updateCalculations() {
        const rows = document.querySelectorAll('#resultBody tr:not(.empty-row)');
        let sData = [];
        rows.forEach((row, rIdx) => {
            const marks = row.querySelectorAll('.mark-input');
            let total = 0, full = 0, fail = false;
            marks.forEach((m, i) => {
                let v = parseFloat(m.value) || 0;
                let fm = parseFloat(document.getElementById(`fm_${i}`)?.value || 100);
                total += v; full += fm;
                if (v < (fm * 0.33)) fail = true;
            });
            row.querySelector('.total-val').innerText = total;
            row.querySelector('.pct-val').innerText = (full > 0 ? (total/full)*100 : 0).toFixed(1) + "%";
            row.querySelector('.status-val').innerHTML = fail ? `<span class="fail">FAIL</span>` : `<span class="pass">PASS</span>`;
            sData.push({ rIdx, total });
        });
        
        let ranked = [...sData].sort((a,b) => b.total - a.total);
        sData.forEach(s => { 
            let r = ranked.findIndex(x => x.total === s.total) + 1; 
            rows[s.rIdx].querySelector('.pos-val').innerHTML = `<span class="position-badge">${r}</span>`; 
        });
    }

    function confirmReset() { if(confirm("Reset everything?")) { localStorage.removeItem('glorious_v2'); location.reload(); } }
    window.onload = () => { loadData(); updateUI(); };
</script>
</body>
</html>
