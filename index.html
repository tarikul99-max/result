<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glorious Education Care - Clean Result Sheet</title>
    <style>
        :root { 
            --primary-green: #1b5e20; 
            --light-green: #4caf50;
            --bg: #f0f4f1; 
            --accent: #0078d4; 
            --danger: #d32f2f;
            --warning: #f57c00;
        }
        
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 1px solid #ddd; }
        
        .excel-header { 
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #43a047 100%); 
            color: white; padding: 30px; text-align: center; 
            border-radius: 10px; position: relative; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 20px;
        }
        
        .header-logo { position: absolute; left: 30px; height: 100px; width: 100px; background: white; padding: 5px; border-radius: 50%; object-fit: contain; }
        .header-text h1 { margin: 0; font-size: 30px; letter-spacing: 2px; text-transform: uppercase; }
        .header-info-line { font-size: 18px; margin-top: 10px; font-weight: bold; color: #ffeb3b; }
        .header-sub-line { font-size: 15px; margin-top: 5px; opacity: 0.9; font-weight: 500; }

        /* Subject list in header hidden */
        #displaySubjects { display: none; }

        .subject-manager, .controls, .Name-add, .backup-manager { 
            background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 15px; 
            border: 1px solid #e0e0e0; display: flex; gap: 15px; align-items: center; flex-wrap: wrap;
        }
        .backup-manager { border-left: 5px solid var(--warning); background: #fff3e0; }

        select, input { padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; transition: 0.2s; }
        .btn-add { background: var(--accent); color: white; }
        .btn-print { background: var(--primary-green); color: white; }
        .btn-reset { background: var(--danger); color: white; }
        .btn-backup { background: var(--warning); color: white; }

        table { width: 100%; border-collapse: collapse; background: white; font-size: 12px; border-radius: 8px; overflow: hidden; }
        th { background-color: #f1f8e9; color: #2e7d32; font-weight: bold; border: 1px solid #c8e6c9; padding: 12px 5px; }
        td { border: 1px solid #e0e0e0; padding: 8px; text-align: center; }
        tr:nth-child(even) { background-color: #fafafa; }
        
        .fm-input { background: #fff9c4; font-weight: bold; border: 1px solid #fbc02d; width: 45px; text-align: center; margin-top: 5px; }
        .input-mark { width: 45px; text-align: center; font-weight: bold; }
        .stu-name { width: 250px; font-weight: bold; }

        .pass { color: #2e7d32; font-weight: bold; background: #e8f5e9; padding: 3px 8px; border-radius: 4px; }
        .fail { color: #c62828; font-weight: bold; background: #ffebee; padding: 3px 8px; border-radius: 4px; }
        .position-badge { background: #388e3c; color: white; padding: 2px 8px; border-radius: 50px; }
        .btn-remove-sub { color: #d32f2f; cursor: pointer; font-size: 10px; display: block; margin-top: 5px; text-decoration: underline; }

        .signature-section { display: none; margin-top: 80px; justify-content: flex-end; padding: 0 50px; }
        .sig-box { border-top: 2px solid #333; width: 200px; text-align: center; font-weight: bold; padding-top: 8px; }

        @media print { 
            .controls, .fm-input, .subject-manager, .btn-remove-sub, .Name-add, .backup-manager { display: none !important; } 
            .signature-section { display: flex !important; }
            tr.empty-row { display: none !important; }
            input { border: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="excel-header">
        <img src="logo.jpeg" alt="Logo" class="header-logo" onerror="this.style.display='none'">
        <div class="header-text">
            <h1>GLORIOUS EDUCATION CARE</h1>
            <div class="header-info-line">Exam: <span id="headerExam">Monthly Model Test</span></div>
            <div class="header-sub-line">Class: <span id="headerClass">9</span> | Group: <span id="headerGroup">General</span></div>
            <div id="displaySubjects"></div> </div>
    </div>

    <div class="backup-manager">
        <strong>Data Safety:</strong>
        <button class="btn-backup" onclick="exportData()">💾 Save Data to Computer</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
        <button class="btn-add" onclick="document.getElementById('importFile').click()">📂 Load Data from Computer</button>
    </div>

    <div class="controls">
        <div><strong>Class:</strong> <select id="classSelect" onchange="saveAndUI()"><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9" selected>9</option><option value="10">10</option></select></div>
        <div><strong>Group:</strong> <select id="groupSelect" onchange="saveAndUI()"><option value="General">General</option><option value="Science">Science</option><option value="Commerce">Commerce</option><option value="Arts">Arts</option></select></div>
        <div><strong>Exam:</strong> <select id="examSelect" onchange="saveAndUI()"><option value="Monthly Model Test">Monthly Test</option><option value="Final Model Test">Final Test</option><option value="Weekly Test">Weekly Test</option></select></div>
        <button class="btn-print" onclick="window.print()">🖨️ Print</button>
        <button class="btn-reset" onclick="confirmReset()">🗑️ Clear All</button>
    </div>

    <div class="subject-manager">
        <strong>Add Subject:</strong> <input type="text" id="newSubName" placeholder="e.g. Math">
        <button class="btn-add" onclick="addSubject()">+ Add</button>
        <span style="margin-left: auto;">Subjects Added: <span id="subCount">0</span></span>
    </div>

    <div class="Name-add">
        <strong>Add Student:</strong> <input type="text" id="newSName" placeholder="Name">
        <button class="btn-add" onclick="addSName()">+ Add Name</button>
    </div>

    <div id="tableContainer"></div>

    <div class="signature-section"><div class="sig-box">Director Signature</div></div>
</div>

<script>
    let subjects = []; 
    let studentNames = [];

    function saveAndUI() { saveData(); updateUI(); }

    function saveData() {
        const marks = {};
        document.querySelectorAll('.mark-input').forEach((el, i) => marks[i] = el.value);
        const fmarks = {};
        subjects.forEach((_, i) => fmarks[i] = document.getElementById(`fm_${i}`).value);

        const data = {
            subjects, studentNames, marks, fmarks,
            class: document.getElementById('classSelect').value,
            group: document.getElementById('groupSelect').value,
            exam: document.getElementById('examSelect').value
        };
        localStorage.setItem('glorious_v2', JSON.stringify(data));
    }

    function loadData() {
        const data = JSON.parse(localStorage.getItem('glorious_v2'));
        if (data) {
            subjects = data.subjects || [];
            studentNames = data.studentNames || [];
            document.getElementById('classSelect').value = data.class;
            document.getElementById('groupSelect').value = data.group;
            document.getElementById('examSelect').value = data.exam;
            renderTable();
        }
    }

    function exportData() {
        saveData();
        const data = localStorage.getItem('glorious_v2');
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Result_Sheet_${new Date().toLocaleDateString()}.json`;
        a.click();
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            localStorage.setItem('glorious_v2', e.target.result);
            location.reload();
        };
        reader.readAsText(file);
    }

    function updateUI() {
        document.getElementById('headerClass').innerText = document.getElementById('classSelect').value;
        document.getElementById('headerGroup').innerText = document.getElementById('groupSelect').value;
        document.getElementById('headerExam').innerText = document.getElementById('examSelect').value;
        // The displaySubjects text update is now effectively hidden via CSS
    }

    function addSubject() {
        const n = document.getElementById('newSubName').value.trim();
        if(n) { subjects.push(n); document.getElementById('newSubName').value = ""; renderTable(); saveAndUI(); }
    }

    function addSName() {
        const n = document.getElementById('newSName').value.trim();
        if(n) { studentNames.push(n); document.getElementById('newSName').value = ""; renderTable(); saveAndUI(); }
    }

    function removeSubject(i) {
        if(confirm("Remove?")) { subjects.splice(i, 1); renderTable(); saveAndUI(); }
    }

    function renderTable() {
        const data = JSON.parse(localStorage.getItem('glorious_v2')) || {};
        document.getElementById('subCount').innerText = subjects.length;
        let html = `<table><thead><tr><th>SL</th><th>Student Name</th>`;
        subjects.forEach((s, i) => {
            let fm = (data.fmarks && data.fmarks[i]) ? data.fmarks[i] : 100;
            html += `<th>${s}<br><input type="number" value="${fm}" class="fm-input" id="fm_${i}" oninput="saveAndCalc()"> <span class="btn-remove-sub" onclick="removeSubject(${i})">X</span></th>`;
        });
        html += `<th>Total</th><th>%</th><th>Status</th><th>Rank</th></tr></thead><tbody id="resultBody">`;
        
        let mCount = 0;
        for(let i=1; i<=100; i++) {
            let name = studentNames[i-1] || "";
            html += `<tr class="${name ? '' : 'empty-row'}">
                <td>${i}</td>
                <td><input type="text" class="stu-name" value="${name}" oninput="saveAndCalc()"></td>
                ${subjects.map(() => {
                    let v = (data.marks && data.marks[mCount]) ? data.marks[mCount] : 0;
                    mCount++;
                    return `<td><input type="number" class="mark-input input-mark" oninput="saveAndCalc()" value="${v}"></td>`;
                }).join('')}
                <td class="total-val">0</td><td class="pct-val">0%</td><td class="status-val">-</td><td class="pos-val">-</td>
            </tr>`;
        }
        document.getElementById('tableContainer').innerHTML = html + `</tbody></table>`;
        updateCalculations();
    }

    function saveAndCalc() { saveData(); updateCalculations(); }

    function updateCalculations() {
        const rows = document.querySelectorAll('#resultBody tr');
        let sData = [];
        rows.forEach((row, rIdx) => {
            const name = row.querySelector('.stu-name').value.trim();
            const marks = row.querySelectorAll('.mark-input');
            let total = 0, full = 0, fail = false;
            marks.forEach((m, i) => {
                let v = parseFloat(m.value) || 0;
                let fm = parseFloat(document.getElementById(`fm_${i}`)?.value || 100);
                total += v; full += fm;
                if (name && v < (fm * 0.33)) fail = true;
            });
            row.querySelector('.total-val').innerText = total;
            row.querySelector('.pct-val').innerText = (full > 0 ? (total/full)*100 : 0).toFixed(1) + "%";
            if(name) {
                row.classList.remove('empty-row');
                row.querySelector('.status-val').innerHTML = fail ? `<span class="fail">FAIL</span>` : `<span class="pass">PASS</span>`;
                sData.push({ rIdx, total });
            } else { row.classList.add('empty-row'); row.querySelector('.status-val').innerText = "-"; }
        });
        let ranked = [...sData].sort((a,b) => b.total - a.total);
        sData.forEach(s => {
            let r = ranked.findIndex(x => x.total === s.total) + 1;
            rows[s.rIdx].querySelector('.pos-val').innerHTML = `<span class="position-badge">${r}</span>`;
        });
    }

    function confirmReset() { if(confirm("Delete everything?")) { localStorage.removeItem('glorious_v2'); location.reload(); } }

    window.onload = () => { loadData(); updateUI(); };
</script>
</body>
</html>
